services:
  db:
    image: postgres:16
    container_name: cafeteria_db
    environment:
      POSTGRES_DB: cafeteria_bd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafeteria_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: always